<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>BudgetFlow Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(100%, 420px);
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        background: #fff;
        box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
        padding: 28px;
        text-align: center;
      }
      .badge {
        width: 64px;
        height: 64px;
        margin: 0 auto;
        border-radius: 24px;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: white;
        font-size: 28px;
        font-weight: 800;
      }
      h1 {
        margin: 18px 0 0;
        font-size: 32px;
        line-height: 1.1;
      }
      p {
        margin: 14px 0 0;
        color: #475569;
        line-height: 1.6;
      }
      .actions {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border-radius: 14px;
        padding: 12px 16px;
        font-weight: 700;
        text-decoration: none;
      }
      .primary {
        border: 0;
        background: #0f172a;
        color: white;
      }
      .soft {
        background: #e2e8f0;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">B</div>
      <h1>Ban dang offline</h1>
      <p>BudgetFlow chua tai duoc du lieu moi. Thu ket noi lai internet roi mo app tiep.</p>
      <div class="actions">
        <button class="btn primary" onclick="window.location.reload()">Thu tai lai</button>
        <a class="btn soft" href="/">Ve trang chu</a>
      </div>
    </main>
  </body>
</html>
